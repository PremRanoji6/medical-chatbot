<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Assistant Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
 
        body {
            background: linear-gradient(135deg, #e8f5f9, #ffffff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
 
        .container {
            width: 90%;
            max-width: 800px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
        }
 
        /* Header */
        .header {
            background: #0b7285;
            color: white;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header .logo { font-size: 28px; }
        .header h1 { font-size: 1.3rem; }
        .header p { font-size: 0.8rem; opacity: 0.85; }
 
        /* Chat window */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: #f8fbfc;
        }
 
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
 
        .user-message {
            background: #0b7285;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
 
        .bot-message {
            background: #ffffff;
            color: #333;
            align-self: flex-start;
            border: 1px solid #dbe9ec;
            border-bottom-left-radius: 2px;
        }
 
        .typing {
            background: #ffffff;
            color: #999;
            align-self: flex-start;
            border: 1px solid #dbe9ec;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
        }
 
        /* Input area */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            border-top: 1px solid #dbe9ec;
            background: #fff;
        }
 
        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }
 
        #user-input:focus { border-color: #0b7285; }
 
        #send-btn {
            padding: 12px 22px;
            background: #0b7285;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
 
        #send-btn:hover { background: #095c6b; }
        #send-btn:disabled { background: #aaa; cursor: not-allowed; }
 
        .disclaimer {
            text-align: center;
            font-size: 0.75rem;
            color: #999;
            padding: 8px 20px;
            background: #fff;
            border-top: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>
 
<div class="container">
 
    <!-- Header -->
    <div class="header">
        <div class="logo">🩺</div>
        <div>
            <h1>MediAssist</h1>
            <p>AI-powered Medical Assistant</p>
        </div>
    </div>
 
    <!-- Chat Messages -->
    <div id="chat-box">
        <div class="message bot-message">
            👋 Hello! I'm MediAssist, your AI medical assistant. Ask me anything about symptoms, medications, or general health information.
        </div>
    </div>
 
    <!-- Input -->
    <div class="input-area">
        <input 
            type="text" 
            id="user-input" 
            placeholder="Type your medical question here..." 
            autocomplete="off"
        />
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
 
    <div class="disclaimer">
        ⚠️ For informational purposes only. Not a substitute for professional medical advice.
    </div>
 
</div>
 
<script>
    const chatBox = document.getElementById("chat-box");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
 
    // Send on Enter key
    userInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") sendMessage();
    });
 
    function appendMessage(text, type) {
        const msg = document.createElement("div");
        msg.classList.add("message", type);
        msg.innerText = text;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msg;
    }
 
    function sendMessage() {
        const msg = userInput.value.trim();
        if (!msg) return;
 
        // Show user message
        appendMessage(msg, "user-message");
        userInput.value = "";
        sendBtn.disabled = true;
 
        // Show typing indicator
        const typing = document.createElement("div");
        typing.classList.add("typing");
        typing.innerText = "MediAssist is thinking...";
        chatBox.appendChild(typing);
        chatBox.scrollTop = chatBox.scrollHeight;
 
        // POST to Flask /get route
        fetch("/get", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "msg=" + encodeURIComponent(msg)
        })
        .then(response => response.text())
        .then(data => {
            chatBox.removeChild(typing);
            appendMessage(data, "bot-message");
            sendBtn.disabled = false;
            userInput.focus();
        })
        .catch(error => {
            chatBox.removeChild(typing);
            appendMessage("⚠️ Error: Could not reach the server. Please try again.", "bot-message");
            sendBtn.disabled = false;
        });
    }
</script>
 
</body>
</html>
